<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create an account</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #1a1a1a;
      --border: #171717;
      --border-focus: #555;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #4b8ef7;
      --btn-bg: #f0f0f0;
      --btn-text: #111;
      --input-bg: #0a0a0a;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    .background {
      position: fixed;
      inset: 0;
      background: var(--bg);
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.4;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
    }

    .card {
      width: 100%;
      max-width: 580px;
      padding: 2.5rem 3rem;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .oauth-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.4rem;
    }

    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      padding: 0.55rem 0.5rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .oauth-btn:hover {
      background: var(--surface);
      border-color: var(--border-focus);
    }

    .oauth-btn svg { flex-shrink: 0; }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      margin: 1.2rem 0;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .input-wrap {
      position: relative;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input::placeholder { color: var(--muted); }

    input:focus { border-color: var(--border-focus); }

    input[type="password"] { padding-right: 2.8rem; }

    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .toggle-pw:hover { color: var(--text); }

    .terms {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 1.2rem 0 1.4rem;
      line-height: 1.5;
    }

    .terms a {
      color: var(--accent);
      text-decoration: none;
    }

    .terms a:hover { text-decoration: underline; }

    .submit-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.7rem 1.6rem;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.15s, transform 0.1s;
    }

    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="background">
    <div class="grid-overlay"></div>
  </div>

  <div class="card">
    <h1>Create an account</h1>

    <div class="oauth-grid">
      <button class="oauth-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </button>

      <button class="oauth-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22.65 14.39L12 22.13 1.35 14.39a.84.84 0 0 1-.3-.94l1.22-3.78 2.44-7.51A.42.42 0 0 1 4.82 2a.43.43 0 0 1 .11.18l2.44 7.49h8.26l2.44-7.49A.42.42 0 0 1 18.18 2a.43.43 0 0 1 .1.18l2.44 7.51 1.22 3.78a.84.84 0 0 1-.29.92z" fill="#E24329"/>
          <path d="M12 22.13l-4.94-15.2h9.88L12 22.13z" fill="#FC6D26"/>
          <path d="M12 22.13L7.06 6.93H2.24L12 22.13z" fill="#FCA326"/>
          <path d="M2.24 6.93L1.02 10.71a.84.84 0 0 0 .3.94L12 22.13 2.24 6.93z" fill="#E24329"/>
          <path d="M2.24 6.93h4.82L4.62 2.11A.42.42 0 0 0 4.07 2a.43.43 0 0 0-.25.45l-1.58 4.48z" fill="#FC6D26"/>
          <path d="M21.76 6.93l1.22 3.78a.84.84 0 0 1-.3.94L12 22.13l9.76-15.2z" fill="#E24329"/>
          <path d="M21.76 6.93h-4.82l2.44-4.82A.42.42 0 0 1 19.93 2a.43.43 0 0 1 .25.45l1.58 4.48z" fill="#FC6D26"/>
        </svg>
        GitLab
      </button>

      <button class="oauth-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M.778 1.213a.768.768 0 0 0-.768.892l3.263 19.81c.084.5.515.868 1.022.873H19.95a.772.772 0 0 0 .77-.646l3.27-20.03a.768.768 0 0 0-.768-.891L.778 1.213zM14.52 15.53H9.522L8.17 8.466h7.561l-1.211 7.064z" fill="#2684FF"/>
        </svg>
        Bitbucket
      </button>

      <button class="oauth-btn">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label for="email"></label>
      <input type="email" id="email" placeholder="youraccount@email.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="password"></label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="meow meow meow meow" autocomplete="new-password"/>
        <button class="toggle-pw" onclick="togglePw()" aria-label="Toggle password visibility">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <p class="terms">
      By signing up you agree to our <a href="#">terms of service</a> and <a href="#">privacy policy</a>.
    </p>

    <button class="submit-btn">Create Account</button>
  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      } else {
        input.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    }
  </script>
</body>
</html>
